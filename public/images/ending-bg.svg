<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="20%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#ffd7e0" stop-opacity="0.25" />
      <stop offset="40%" stop-color="#ff9fb0" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#2b0710" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff9fb0" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#4a1220" stop-opacity="0.65" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <!-- base layers -->
  <rect width="100%" height="100%" fill="url(#g1)" />
  <rect width="100%" height="100%" fill="url(#g2)" />

  <!-- soft bokeh circles -->
  <g fill="#ffd1de" opacity="0.08" filter="url(#blur)">
    <circle cx="320" cy="200" r="120" />
    <circle cx="1500" cy="300" r="80" />
    <circle cx="400" cy="800" r="160" />
    <circle cx="1400" cy="900" r="120" />
  </g>

  <!-- subtle hearts pattern -->
  <g fill="#ff7a95" opacity="0.06">
    <path d="M420 520c0-26 22-48 48-48 18 0 34 10 42 25 8-15 24-25 42-25 26 0 48 22 48 48 0 44-64 78-90 96-26-18-90-52-90-96z" transform="translate(0,-60) scale(1.6)" />
    <path d="M1320 420c0-20 18-38 38-38 14 0 26 8 32 20 6-12 18-20 32-20 20 0 38 18 38 38 0 36-52 64-74 80-22-16-74-44-74-80z" transform="translate(0,0) scale(1.2)" />
  </g>

  <!-- decorative gradient glow -->
  <ellipse cx="960" cy="300" rx="700" ry="260" fill="#ff6f8a" opacity="0.04" filter="url(#blur)" />

  <!-- subtle grain texture -->
  <g opacity="0.03" fill="#000">
    <rect width="1920" height="1080" fill="black" />
  </g>

  <!-- finally, vignette -->
  <rect width="100%" height="100%" fill="black" opacity="0.18" />
  <g>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#g1)" opacity="0.06"/>
  </g>
</svg>
