<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>لعبة المتاهة — Mai & Mostafa</title>
<link rel="stylesheet" href="./css/maze.css">
</head>
<body>

<h1>🎮 لعبة المتاهة</h1>
<p class="subtitle">— وصّل للنهاية عشان توصل لقلبي —</p>

<div id="mazeContainer">
  <canvas id="mazeCanvas"></canvas>
</div>

<div id="status">استخدم الأزرار أو الأسهم عالتلفون 🎮</div>

<button id="backBtn">←</button>

<div id="dpad">
  <div class="dpad-row" style="direction:ltr">
    <button class="dpad-btn" id="btnUp" aria-label="فوق">↑</button>
  </div>
  <div class="dpad-row" style="direction:ltr">
    <button class="dpad-btn" id="btnLeft" aria-label="شمال">←</button>
    <button class="dpad-btn" id="btnDown" aria-label="تحت">↓</button>
    <button class="dpad-btn" id="btnRight" aria-label="يمين">→</button>
  </div>
</div>

<div id="winOverlay">
  <div class="hearts-row">💕 💗 💕</div>
  <h2>وصّلت 🤍✨</h2>
  <div class="divider"></div>
  <p>كل ما تقولي 'فاهمة حاجة؟' ببقى عايزة أقولك: أنا مش فاهمة أي حاجة في الدنيا غير إنك اشطر كتكوت ومقدرش أستغنى عنك يا كابتن.</p>
  <button id="exitGameBtn" class="mt-8 inline-flex items-center gap-3 px-8 py-3 rounded-xl text-sm tracking-wider transition-all duration-500 group bg-gradient-to-b from-[#1f0a12] to-[#0d0508] border border-rose-500/20 hover:border-rose-400/50 text-rose-300 hover:text-rose-200" style="transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-log-out w-4 h-4 group-hover:-translate-x-0.5 transition-transform"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg>
    طلوع من اللعبه
  </button>
</div>

<script src="./js/maze.js"></script>
</body>
</html>
